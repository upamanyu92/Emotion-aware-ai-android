name: PR Merge – Build APK & Deploy to Play Store

# Triggers on every push to main (i.e. merged PR) and on manual dispatch.
# Builds a signed release APK + AAB inside the Android Docker builder image
# and publishes the AAB to the Play Store internal testing track.
#
# Required GitHub Secrets:
#   KEYSTORE_BASE64                  – Base64-encoded release.keystore
#   KEYSTORE_PASSWORD                – Keystore password
#   KEY_ALIAS                        – Key alias (e.g. emotionawareai)
#   KEY_PASSWORD                     – Key password
#   HUGGING_FACE_KEY                 – Hugging Face access token used during build/test
#   PLAY_STORE_SERVICE_ACCOUNT_JSON  – Google Play service-account JSON (full content)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Only one deployment at a time on the main branch.
concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

# Opt into Node.js 24 for all JavaScript actions to silence the Node 20
# deprecation warning that will become an error in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Docker Build & Publish to Play Store
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Android builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: android-builder:deploy
          load: true
          cache-from: type=gha,scope=android-builder
          cache-to: type=gha,mode=max,scope=android-builder

      # ── Decode release keystore ───────────────────────────────────────────
      - name: Decode release keystore
        run: |
          echo "::notice::Decoding release keystore"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/release.keystore"
          echo "KEYSTORE_FILE=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"

      # ── Normalize keystore format ─────────────────────────────────────────
      # Modern JDK 9+ keystores use AES-256 PKCS12 encryption with extended
      # ASN.1 tags (tag > 30) that Android build-tools' BouncyCastle cannot
      # parse. Converting to JKS avoids this incompatibility entirely.
      - name: Normalize keystore to JKS format
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "::notice::Converting keystore to JKS for Android build-tools compatibility"
          if keytool -importkeystore \
            -srckeystore "${{ runner.temp }}/release.keystore" \
            -destkeystore "${{ runner.temp }}/release-jks.keystore" \
            -deststoretype JKS \
            -srcstorepass "${KEYSTORE_PASS}" \
            -deststorepass "${KEYSTORE_PASS}" \
            -noprompt 2>&1; then
            # Verify the converted keystore is valid before replacing the original
            if keytool -list \
              -keystore "${{ runner.temp }}/release-jks.keystore" \
              -storepass "${KEYSTORE_PASS}" \
              -storetype JKS > /dev/null 2>&1; then
              mv "${{ runner.temp }}/release-jks.keystore" "${{ runner.temp }}/release.keystore"
              echo "KEYSTORE_TYPE=JKS" >> "$GITHUB_ENV"
              echo "::notice::Keystore successfully converted and validated as JKS format"
            else
              rm -f "${{ runner.temp }}/release-jks.keystore"
              echo "::warning::JKS keystore validation failed; using original keystore"
            fi
          else
            rm -f "${{ runner.temp }}/release-jks.keystore"
            echo "::warning::JKS conversion failed; using original keystore format"
          fi

      # ── Run unit tests ────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          echo "::notice::Running unit tests before release build"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e HUGGING_FACE_KEY="${{ secrets.HUGGING_FACE_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            -w /workspace \
            android-builder:deploy \
            bash -c "chmod +x gradlew && ./gradlew test --stacktrace 2>&1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-deploy-${{ github.run_number }}
          path: app/build/reports/tests/

      # ── Build signed APK + AAB inside Docker ─────────────────────────────
      - name: Build signed release APK and AAB
        run: |
          echo "::notice::Building signed release APK and AAB (SHA ${{ github.sha }})"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ runner.temp }}/release.keystore:/tmp/release.keystore:ro" \
            -e KEYSTORE_FILE=/tmp/release.keystore \
            -e KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -e KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -e KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -e KEYSTORE_TYPE="${{ env.KEYSTORE_TYPE }}" \
            -e HUGGING_FACE_KEY="${{ secrets.HUGGING_FACE_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            -w /workspace \
            android-builder:deploy \
            bash -c "chmod +x gradlew && ./gradlew assembleRelease bundleRelease --stacktrace 2>&1"

      # ── Upload build artifacts ────────────────────────────────────────────
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.run_number }}
          path: app/build/outputs/bundle/release/*.aab

      # ── Publish to Google Play Store ──────────────────────────────────────
      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.emotionawareai
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          changesNotSentForReview: false

      # ── Build summary ─────────────────────────────────────────────────────
      - name: Write deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          APK_PATH=$(find "${{ github.workspace }}/app/build/outputs/apk/release" -name '*.apk' 2>/dev/null | head -1)
          AAB_PATH=$(find "${{ github.workspace }}/app/build/outputs/bundle/release" -name '*.aab' 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "| Release APK size | $APK_SIZE |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::Release APK built ($APK_SIZE)"
          fi
          if [ -n "$AAB_PATH" ]; then
            AAB_SIZE=$(du -sh "$AAB_PATH" | cut -f1)
            echo "| Release AAB size | $AAB_SIZE |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::Release AAB built ($AAB_SIZE) — published to Play Store internal track"
          fi

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: |
          rm -f "${{ runner.temp }}/release.keystore"
          echo "::notice::Keystore file removed"
