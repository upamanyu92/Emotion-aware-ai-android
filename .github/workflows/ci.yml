name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for all JavaScript actions to silence the Node 20
# deprecation warning that will become an error in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Android builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: android-builder:ci
          # Keep the image locally so later steps can use it
          load: true
          # Cache layers across runs to speed up subsequent builds
          cache-from: type=gha,scope=android-builder
          cache-to: type=gha,mode=max,scope=android-builder

      # ── Build debug APK inside Docker ─────────────────────────────────────
      - name: Build debug APK
        run: |
          echo "::notice::Building debug APK (SHA ${{ github.sha }})"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e HUGGING_FACE_KEY="${{ secrets.HUGGING_FACE_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            -w /workspace \
            android-builder:ci \
            bash -c "chmod +x gradlew && ./gradlew assembleDebug --stacktrace 2>&1"

      # ── Run unit tests inside Docker ──────────────────────────────────────
      - name: Run unit tests
        run: |
          echo "::notice::Running unit tests"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e HUGGING_FACE_KEY="${{ secrets.HUGGING_FACE_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            -w /workspace \
            android-builder:ci \
            bash -c "chmod +x gradlew && ./gradlew test --stacktrace 2>&1"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk

      # ── Build summary ─────────────────────────────────────────────────────
      - name: Write build summary
        if: always()
        run: |
          echo "## CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch/Ref | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          APK_PATH=$(find "${{ github.workspace }}/app/build/outputs/apk/debug" -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "| Debug APK size | $APK_SIZE |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice file=$APK_PATH::Debug APK built successfully ($APK_SIZE)"
          fi
