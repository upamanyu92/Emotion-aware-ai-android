name: Release to Google Play

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Decode the Base64-encoded keystore stored in GitHub Secrets and write
      # it to a temporary file so Gradle can reference it during signing.
      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.keystore
          echo "KEYSTORE_FILE=${{ runner.temp }}/release.keystore" >> $GITHUB_ENV

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build release Android App Bundle (AAB)
        run: ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab

      # Write the Google Play service-account JSON to a temp file and upload
      # the AAB to the "internal" track.  Change `track` to "alpha", "beta",
      # or "production" when you are ready to expand the rollout.
      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.emotionawareai
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          changesNotSentForReview: false

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ runner.temp }}/release.keystore
